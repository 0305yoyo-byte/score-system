<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>計分系統</title>

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --danger-dark: #b91c1c;
      --success: #16a34a;
      --warning: #f59e0b;
      --radius: 16px;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
    }

    header .bar {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    h1 {
      font-size: 22px;
      margin: 0;
    }

    h2 {
      font-size: 20px;
      margin: 0 0 12px;
    }

    h3 {
      font-size: 17px;
      margin: 0 0 10px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .hidden {
      display: none !important;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
    }

    .mode-card {
      cursor: pointer;
      text-align: center;
      padding: 32px 18px;
      transition: 0.18s;
    }

    .mode-card:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
    }

    .mode-card .icon {
      font-size: 44px;
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 10px 0 6px;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 13px;
      background: white;
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 800;
      cursor: pointer;
      background: var(--primary);
      color: white;
      transition: 0.15s;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    button.secondary:hover {
      background: #d1d5db;
    }

    button.danger {
      background: var(--danger);
    }

    button.danger:hover {
      background: var(--danger-dark);
    }

    button.success {
      background: var(--success);
    }

    button.warning {
      background: var(--warning);
      color: #111827;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 800;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 11px 8px;
      vertical-align: middle;
    }

    th {
      color: #374151;
      background: #f9fafb;
      font-size: 14px;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .score {
      font-weight: 900;
      font-size: 18px;
    }

    .positive {
      color: var(--success);
      font-weight: 900;
    }

    .negative {
      color: var(--danger);
      font-weight: 900;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tabs button {
      background: #e5e7eb;
      color: #111827;
    }

    .tabs button.active {
      background: var(--primary);
      color: white;
    }

    .result-box {
      border: 1px dashed #cbd5e1;
      border-radius: 14px;
      padding: 14px;
      background: #f8fafc;
      margin-top: 14px;
    }

    .big-score {
      font-size: 42px;
      font-weight: 1000;
      line-height: 1;
      margin: 10px 0;
    }

    .notice {
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      margin-bottom: 14px;
      font-weight: 700;
    }

    .success-note {
      padding: 12px 14px;
      border-radius: 12px;
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      color: #166534;
      margin-top: 12px;
      font-weight: 700;
    }

    .danger-note {
      padding: 12px 14px;
      border-radius: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      margin-top: 12px;
      font-weight: 700;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    .mobile-list {
      display: none;
    }

    .desktop-table {
      display: block;
    }

    .log-player-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .log-player-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px;
      background: #ffffff;
      cursor: pointer;
      transition: 0.15s;
    }

    .log-player-card:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    .log-player-card.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .log-player-card .name {
      font-weight: 900;
      font-size: 17px;
      margin-bottom: 5px;
    }

    @media (max-width: 760px) {
      header .bar {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        padding: 14px;
      }

      .grid,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 15px;
      }

      h1 {
        font-size: 20px;
      }

      .desktop-table {
        display: none;
      }

      .mobile-list {
        display: grid;
        gap: 10px;
      }

      .person-card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 13px;
        background: #fff;
      }

      .person-card .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin: 6px 0;
      }

      .person-card .name {
        font-size: 18px;
        font-weight: 900;
      }

      button {
        width: 100%;
      }

      .top-actions button,
      .actions button {
        flex: 1 1 140px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="bar">
      <h1>計分系統</h1>
      <div class="top-actions">
        <span id="currentMode" class="pill hidden"></span>
        <button class="secondary hidden" id="backHomeBtn" onclick="goHome()">回首頁</button>
      </div>
    </div>
  </header>

  <main>
    <section id="homeView">
      <div class="card">
        <h2>請選擇使用模式</h2>
        <p class="muted">管理員可以管理隊員、排行榜與紀錄；關主可以查詢隊員並加減分。</p>

        <div class="grid">
          <div class="card mode-card" onclick="showAdminLogin()">
            <div class="icon">🛠️</div>
            <h2>管理員模式</h2>
            <p class="muted">需要輸入 PIN 碼</p>
          </div>

          <div class="card mode-card" onclick="showJudgeLogin()">
            <div class="icon">🎯</div>
            <h2>關主模式</h2>
            <p class="muted">進入前需要輸入關主名字</p>
          </div>
        </div>
      </div>
    </section>

    <section id="adminLoginView" class="hidden">
      <div class="card">
        <h2>管理員登入</h2>
        <label for="adminPinInput">請輸入 PIN 碼</label>
        <input id="adminPinInput" type="password" inputmode="numeric" />
        <div class="actions">
          <button onclick="loginAdmin()">進入管理員模式</button>
          <button class="secondary" onclick="goHome()">取消</button>
        </div>
        <div id="adminLoginMsg"></div>
      </div>
    </section>

    <section id="judgeLoginView" class="hidden">
      <div class="card">
        <h2>關主登入</h2>
        <label for="judgeNameInput">請輸入關主名字</label>
        <input id="judgeNameInput" type="text" placeholder="例如：第一關關主、王小明" />
        <div class="actions">
          <button onclick="loginJudge()">進入關主模式</button>
          <button class="secondary" onclick="goHome()">取消</button>
        </div>
        <div id="judgeLoginMsg"></div>
      </div>
    </section>

    <section id="adminView" class="hidden">
      <div class="tabs">
        <button id="tabPersonal" onclick="showAdminTab('personal')">個人排行榜</button>
        <button id="tabGroup" onclick="showAdminTab('group')">小組排行榜</button>
        <button id="tabLogs" onclick="showAdminTab('logs')">加減分紀錄</button>
        <button id="tabMembers" onclick="showAdminTab('members')">隊員管理</button>
      </div>

      <div id="adminPersonalTab" class="card hidden">
        <h2>個人積分排行榜</h2>
        <div id="personalRanking"></div>
      </div>

      <div id="adminGroupTab" class="card hidden">
        <h2>小組總分排行榜</h2>
        <div id="groupRanking"></div>
      </div>

      <div id="adminLogsTab" class="hidden">
        <div class="card">
          <div class="top-actions" style="justify-content: space-between; margin-bottom: 10px;">
            <div>
              <h2>查詢隊員加減分紀錄</h2>
              <p class="muted">請先點擊一位隊員，再查看該隊員的加減分紀錄。</p>
            </div>
            <button class="danger" onclick="clearLogs()">清除所有紀錄</button>
          </div>

          <label for="logPlayerSearchInput">搜尋隊員</label>
          <input id="logPlayerSearchInput" type="text" placeholder="輸入編號、名字或組別" oninput="renderLogPlayerList()" />

          <div id="logPlayerList"></div>
        </div>

        <div id="selectedPlayerLogsCard" class="card hidden">
          <div class="top-actions" style="justify-content: space-between; margin-bottom: 10px;">
            <div>
              <h2 id="selectedPlayerLogsTitle">加減分紀錄</h2>
              <p id="selectedPlayerLogsInfo" class="muted"></p>
            </div>
            <button class="secondary" onclick="clearSelectedLogPlayer()">重新選擇隊員</button>
          </div>

          <div id="selectedPlayerLogs"></div>
        </div>
      </div>

      <div id="adminMembersTab" class="hidden">
        <div class="card">
          <h2 id="memberFormTitle">新增隊員</h2>

          <div class="grid-3">
            <div>
              <label for="memberNumber">編號</label>
              <input id="memberNumber" type="number" min="1" placeholder="流水號，例如 1" />
            </div>

            <div>
              <label for="memberName">名字</label>
              <input id="memberName" type="text" placeholder="隊員名字" />
            </div>

            <div>
              <label for="memberGroup">組別</label>
              <input id="memberGroup" type="text" placeholder="例如：1、2、A組" />
            </div>
          </div>

          <div class="actions">
            <button onclick="saveMember()">儲存隊員</button>
            <button class="secondary" onclick="resetMemberForm()">清空表單</button>
            <button class="warning" onclick="autoFillNumber()">自動填入下一個流水號</button>
          </div>

          <div id="memberFormMsg"></div>
        </div>

        <div class="card">
          <h2>隊員列表與分數調整</h2>
          <p class="muted">可編輯隊員資料、刪除隊員、直接調整分數或將分數歸零。</p>

          <div class="grid">
            <div>
              <label for="adminSearchInput">搜尋隊員</label>
              <input id="adminSearchInput" type="text" placeholder="輸入編號、名字或組別" oninput="renderMembers()" />
            </div>

            <div>
              <label for="sortSelect">排序方式</label>
              <select id="sortSelect" onchange="renderMembers()">
                <option value="number">依編號排序</option>
                <option value="score">依分數排序</option>
                <option value="group">依組別排序</option>
                <option value="name">依名字排序</option>
              </select>
            </div>
          </div>

          <div id="membersList" style="margin-top: 14px;"></div>
        </div>
      </div>
    </section>

    <section id="judgeView" class="hidden">
      <div class="card">
        <h2>關主加減分</h2>
        <p class="muted">目前關主：<strong id="judgeNameDisplay"></strong></p>

        <label for="judgeSearchInput">輸入隊員名字或編號</label>
        <input id="judgeSearchInput" type="text" placeholder="例如：1 或 王小明" />

        <div class="actions">
          <button onclick="judgeSearchMember()">查詢隊員</button>
          <button class="secondary" onclick="clearJudgeSearch()">清空查詢</button>
        </div>

        <div id="judgeSearchMsg"></div>

        <div id="judgeMemberResult" class="result-box hidden">
          <h3>查詢結果</h3>
          <div class="grid">
            <div>
              <p>編號：<strong id="foundNumber"></strong></p>
              <p>名字：<strong id="foundName"></strong></p>
              <p>組別：<strong id="foundGroup"></strong></p>
            </div>

            <div>
              <p>目前個人積分</p>
              <div id="foundScore" class="big-score">0</div>
            </div>
          </div>

          <hr style="border: 0; border-top: 1px solid var(--line); margin: 14px 0;">

          <div class="grid">
            <div>
              <label for="scoreChangeInput">加減分數</label>
              <input id="scoreChangeInput" type="number" placeholder="加分輸入正數，扣分輸入負數，例如 10 或 -5" />
            </div>

            <div>
              <label for="scoreReasonInput">備註</label>
              <input id="scoreReasonInput" type="text" placeholder="例如：第一關完成、違規扣分，可空白" />
            </div>
          </div>

          <div class="actions">
            <button class="success" onclick="applyJudgeScore()">確認加減分</button>
          </div>

          <div id="judgeScoreMsg"></div>
        </div>
      </div>
    

      <div class="card">
        <div class="top-actions" style="justify-content: space-between; margin-bottom: 10px;">
          <div>
            <h2>我的加減分紀錄</h2>
            <p class="muted">只顯示目前這位關主登入後，自己執行過的加減分動作。</p>
          </div>
          <button class="secondary" onclick="renderJudgeOwnLogs()">重新整理紀錄</button>
        </div>
        <div id="judgeOwnLogs"></div>
      </div></section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      push,
      update,
      remove,
      runTransaction,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCDAs_hLvY1jXlp8NuLFm84eeDPBPsjMjo",
      authDomain: "score-system-fbfad.firebaseapp.com",
      projectId: "score-system-fbfad",
      storageBucket: "score-system-fbfad.firebasestorage.app",
      messagingSenderId: "955329471551",
      appId: "1:955329471551:web:8d665179d2bafb252a848a",
      measurementId: "G-M10DGX30ZN"
    };

    const app = initializeApp(firebaseConfig);

    // 如果你的 Realtime Database 不是 us-central1，通常需要填 databaseURL。
    // 建立 Realtime Database 後，在 Firebase Console 的 Realtime Database 頁面可以看到資料庫網址。
    // 例："https://score-system-fbfad-default-rtdb.asia-southeast1.firebasedatabase.app"
    const REALTIME_DATABASE_URL = "https://score-system-fbfad-default-rtdb.firebaseio.com";
    const db = REALTIME_DATABASE_URL ? getDatabase(app, REALTIME_DATABASE_URL) : getDatabase(app);

    const ADMIN_PIN = "1234";
    const DB_ROOT = "scoreSystem";
    const playersRef = ref(db, `${DB_ROOT}/players`);
    const logsRef = ref(db, `${DB_ROOT}/logs`);

    let currentJudgeName = "";
    let editingMemberId = null;
    let selectedMemberIdForJudge = null;
    let selectedLogPlayerId = null;
    let playersLoaded = false;
    let logsLoaded = false;

    let data = {
      players: [],
      logs: []
    };

    function showError(where, error) {
      console.error(error);
      const message = error?.message || String(error);
      alert(`${where} 失敗：${message}`);
    }

    function normalizePlayers(snapshotValue) {
      if (!snapshotValue) return [];
      return Object.entries(snapshotValue).map(([id, value]) => ({
        id,
        number: Number(value.number || 0),
        name: value.name || "",
        group: value.group || "",
        score: Number(value.score || 0),
        createdAt: value.createdAt || 0,
        updatedAt: value.updatedAt || 0
      })).sort((a, b) => Number(a.number) - Number(b.number));
    }

    function normalizeLogs(snapshotValue) {
      if (!snapshotValue) return [];
      return Object.entries(snapshotValue).map(([id, value]) => ({
        id,
        ...value,
        change: Number(value.change || 0),
        beforeScore: Number(value.beforeScore || 0),
        afterScore: Number(value.afterScore || 0),
        createdAt: value.createdAt || 0
      })).sort((a, b) => Number(a.createdAt || 0) - Number(b.createdAt || 0));
    }

    function startRealtimeSync() {
      onValue(playersRef, snapshot => {
        data.players = normalizePlayers(snapshot.val());
        playersLoaded = true;
        refreshCurrentView();
      }, error => showError("讀取隊員資料", error));

      onValue(logsRef, snapshot => {
        data.logs = normalizeLogs(snapshot.val());
        logsLoaded = true;
        refreshCurrentView();
      }, error => showError("讀取加減分紀錄", error));
    }

    function refreshCurrentView() {
      if (!playersLoaded || !logsLoaded) return;

      if (!document.getElementById("adminPersonalTab").classList.contains("hidden")) renderPersonalRanking();
      if (!document.getElementById("adminGroupTab").classList.contains("hidden")) renderGroupRanking();
      if (!document.getElementById("adminLogsTab").classList.contains("hidden")) {
        renderLogPlayerList();
        if (selectedLogPlayerId) renderSelectedPlayerLogs();
      }
      if (!document.getElementById("adminMembersTab").classList.contains("hidden")) renderMembers();

      if (!document.getElementById("judgeView").classList.contains("hidden")) {
        if (selectedMemberIdForJudge) {
          const player = data.players.find(p => p.id === selectedMemberIdForJudge);
          if (player) {
            document.getElementById("foundScore").textContent = player.score || 0;
            document.getElementById("foundNumber").textContent = player.number;
            document.getElementById("foundName").textContent = player.name;
            document.getElementById("foundGroup").textContent = player.group;
          }
        }
        renderJudgeOwnLogs();
      }
    }

    function nowText() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      return `${yyyy}/${mm}/${dd} ${hh}:${mi}:${ss}`;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function hideAllViews() {
      document.getElementById("homeView").classList.add("hidden");
      document.getElementById("adminLoginView").classList.add("hidden");
      document.getElementById("judgeLoginView").classList.add("hidden");
      document.getElementById("adminView").classList.add("hidden");
      document.getElementById("judgeView").classList.add("hidden");
    }

    function setModeLabel(text) {
      const label = document.getElementById("currentMode");
      const backBtn = document.getElementById("backHomeBtn");

      if (text) {
        label.textContent = text;
        label.classList.remove("hidden");
        backBtn.classList.remove("hidden");
      } else {
        label.textContent = "";
        label.classList.add("hidden");
        backBtn.classList.add("hidden");
      }
    }

    function goHome() {
      hideAllViews();
      document.getElementById("homeView").classList.remove("hidden");
      setModeLabel("");
      currentJudgeName = "";
      selectedMemberIdForJudge = null;
      selectedLogPlayerId = null;
      editingMemberId = null;

      document.getElementById("adminPinInput").value = "";
      document.getElementById("judgeNameInput").value = "";
      document.getElementById("adminLoginMsg").innerHTML = "";
      document.getElementById("judgeLoginMsg").innerHTML = "";
    }

    function showAdminLogin() {
      hideAllViews();
      document.getElementById("adminLoginView").classList.remove("hidden");
      setModeLabel("管理員登入");
      setTimeout(() => document.getElementById("adminPinInput").focus(), 50);
    }

    function showJudgeLogin() {
      hideAllViews();
      document.getElementById("judgeLoginView").classList.remove("hidden");
      setModeLabel("關主登入");

    async function saveMember() {
      const number = Number(document.getElementById("memberNumber").value);
      const name = document.getElementById("memberName").value.trim();
      const group = document.getElementById("memberGroup").value.trim();
      const msg = document.getElementById("memberFormMsg");

      if (!number || number < 1) {
        msg.innerHTML = `<div class="danger-note">請輸入有效的流水號編號。</div>`;
        return;
      }

      if (!name) {
        msg.innerHTML = `<div class="danger-note">請輸入隊員名字。</div>`;
        return;
      }

      if (!group) {
        msg.innerHTML = `<div class="danger-note">請輸入組別。</div>`;
        return;
      }

      const duplicatedNumber = data.players.some(p => Number(p.number) === number && p.id !== editingMemberId);
      if (duplicatedNumber) {
        msg.innerHTML = `<div class="danger-note">這個編號已經有人使用，請換一個流水號。</div>`;
        return;
      }

      try {
        const now = serverTimestamp();
        if (editingMemberId) {
          await update(ref(db, `${DB_ROOT}/players/${editingMemberId}`), {
            number,
            name,
            group,
            updatedAt: now
          });
          msg.innerHTML = `<div class="success-note">隊員資料已更新。</div>`;
        } else {
          await push(playersRef, {
            number,
            name,
            group,
            score: 0,
            createdAt: now,
            updatedAt: now
          });
          msg.innerHTML = `<div class="success-note">已新增隊員。</div>`;
        }

        resetMemberForm();
      } catch (error) {
        showError("儲存隊員", error);
      }
    }

    function judgeSearchMember() {
      const keyword = document.getElementById("judgeSearchInput").value.trim();
      const msg = document.getElementById("judgeSearchMsg");

      document.getElementById("judgeScoreMsg").innerHTML = "";
      selectedMemberIdForJudge = null;

      if (!keyword) {
        msg.innerHTML = `<div class="danger-note">請輸入隊員名字或編號。</div>`;
        document.getElementById("judgeMemberResult").classList.add("hidden");
        return;
      }

      const exactNumber = Number(keyword);
      let matches = data.players.filter(p => {
        const byNumber = !isNaN(exactNumber) && Number(p.number) === exactNumber;
        const byName = String(p.name).includes(keyword);
        return byNumber || byName;
      });

      if (matches.length === 0) {
        msg.innerHTML = `<div class="danger-note">找不到這位隊員，請確認名字或編號是否正確。</div>`;
        document.getElementById("judgeMemberResult").classList.add("hidden");
        return;
      }

      if (matches.length > 1) {
        msg.innerHTML = `
          <div class="notice">
            找到多位名字相近的隊員，請改用「編號」查詢：<br>
            ${matches.map(p => `編號 ${escapeHtml(p.number)}：${escapeHtml(p.name)}（${escapeHtml(p.group)}組）`).join("<br>")}
          </div>
        `;
        document.getElementById("judgeMemberResult").classList.add("hidden");
        return;
      }

      const player = matches[0];
      selectedMemberIdForJudge = player.id;

      document.getElementById("foundNumber").textContent = player.number;
      document.getElementById("foundName").textContent = player.name;
      document.getElementById("foundGroup").textContent = player.group;
      document.getElementById("foundScore").textContent = player.score || 0;

      msg.innerHTML = "";
      document.getElementById("judgeMemberResult").classList.remove("hidden");
      document.getElementById("scoreChangeInput").focus();
    }

    async function applyJudgeScore() {
      const msg = document.getElementById("judgeScoreMsg");

      if (!selectedMemberIdForJudge) {
        msg.innerHTML = `<div class="danger-note">請先查詢並選定隊員後，才能加減分。</div>`;
        return;
      }

      const change = Number(document.getElementById("scoreChangeInput").value);
      const reason = document.getElementById("scoreReasonInput").value.trim();

      if (isNaN(change) || change === 0) {
        msg.innerHTML = `<div class="danger-note">請輸入有效的加減分數，且不可為 0。</div>`;
        return;
      }

      const playerRef = ref(db, `${DB_ROOT}/players/${selectedMemberIdForJudge}`);

      try {
        let result = null;
        const time = nowText();

        const transactionResult = await runTransaction(playerRef, current => {
          if (current === null) return;

          const beforeScore = Number(current.score || 0);
          const afterScore = beforeScore + change;

          result = {
            player: {
              id: selectedMemberIdForJudge,
              number: current.number,
              name: current.name,
              group: current.group
            },
            beforeScore,
            afterScore,
            time
          };

          return {
            ...current,
            score: afterScore,
            updatedAt: serverTimestamp()
          };
        });

        if (!transactionResult.committed || !result) {
          throw new Error("找不到隊員資料，請重新查詢。");
        }

        await push(logsRef, {
          time,
          createdAt: serverTimestamp(),
          judgeName: currentJudgeName,
          playerId: result.player.id,
          playerNumber: result.player.number,
          playerName: result.player.name,
          group: result.player.group,
          change,
          beforeScore: result.beforeScore,
          afterScore: result.afterScore,
          reason
        });

        document.getElementById("foundScore").textContent = result.afterScore;
        document.getElementById("scoreChangeInput").value = "";
        document.getElementById("scoreReasonInput").value = "";

        msg.innerHTML = `
          <div class="success-note">
            已完成加減分：${escapeHtml(result.player.name)}
            ${change > 0 ? "加" : "扣"} ${Math.abs(change)} 分，
            目前分數為 ${result.afterScore} 分。
          </div>
        `;
        renderJudgeOwnLogs();
      } catch (error) {
        showError("加減分", error);
      }
    }

    document.addEventListener("keydown", function (e) {
      if (e.key !== "Enter") return;

      if (!document.getElementById("adminLoginView").classList.contains("hidden")) {
        loginAdmin();
      } else if (!document.getElementById("judgeLoginView").classList.contains("hidden")) {
        loginJudge();
      } else if (!document.getElementById("judgeView").classList.contains("hidden")) {
        const resultHidden = document.getElementById("judgeMemberResult").classList.contains("hidden");
        if (resultHidden) judgeSearchMember();
      }
    });

    Object.assign(window, {
      goHome,
      showAdminLogin,
      showJudgeLogin,
      loginAdmin,
      loginJudge,
      showAdminTab,
      renderLogPlayerList,
      selectLogPlayer,
      clearSelectedLogPlayer,
      clearLogs,
      autoFillNumber,
      resetMemberForm,
      saveMember,
      renderMembers,
      editMember,
      deleteMember,
      updateScoreByAdmin,
      resetScoreByAdmin,
      clearJudgeSearch,
      judgeSearchMember,
      applyJudgeScore,
      renderJudgeOwnLogs
    });

    startRealtimeSync();
    goHome();
  </script>

</body>
</html>
